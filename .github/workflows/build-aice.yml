# Rebuild AICE artifacts from source/standards.yaml
# Run on push to main (and optionally to source/ or scripts/) or on workflow_dispatch for CI/CD.
name: Build AICE

on:
  push:
    branches: [main]
    paths:
      - 'source/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build AICE artifacts
        run: python scripts/build_aice.py

      - name: Show generated artifact summary
        run: |
          echo "Generated artifacts:"
          ls -la .cursor/rules/ 2>/dev/null || true
          test -f .github/copilot-instructions.md && echo ".github/copilot-instructions.md OK"
          test -f AGENTS.md && echo "AGENTS.md OK"
          test -f docs/AICE-Standards.md && echo "docs/AICE-Standards.md OK"

      - name: Upload AICE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aice-artifacts
          path: |
            .cursor/rules/
            .github/copilot-instructions.md
            AGENTS.md
            docs/AICE-Standards.md

      # Optional: commit generated files back to the repo (uncomment if you want CI to push)
